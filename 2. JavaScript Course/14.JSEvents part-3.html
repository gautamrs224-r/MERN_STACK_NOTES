<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JSEvents</title>
    <style>
      body {
        background-color: gray;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-wrap: wrap;
        height: 100vh;
        width: 100vw;
      }
      #main {
        background-color: rgb(0, 124, 124);
        margin: 20px;
        padding: 10px;
        border: 2px solid crimson;
        height: 300px;
        width: 300px;
        display: flex;
        justify-content: center;
      }
      #main form input {
        margin: 5px;
        padding: 5px;
        background-color: lightblue;
        border: 3px solid darkblue;
      }
      form {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }

      .card {
        margin: 30px 20px;
        padding: 7px;
        background-color: darkslategrey;
        height: 300px;
        width: 300px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }

      .card img {
        background-color: red;
        height: 70px;
        width: 70px;
        border-radius: 50px;
        border: 2px solid lightseagreen;
      }

      .card h2,
      h3 {
        color: white;
        margin: 8px;
      }
      .card p {
        color: grey;
        text-align: center;
      }
    </style>
  </head>
  <body id="bdy">
    <div id="main">
      <form action="">
        <input type="text" placeholder="Profile pic" />
        <input type="text" placeholder="Name" />
        <input type="text" placeholder="Occupation" />
        <input type="text" placeholder="Bid data here" />
        <input type="submit" />
      </form>
    </div>

    

    <script>
      let form = document.querySelector("form");
      let inputs = document.querySelectorAll("input");
      let body = document.querySelector("#bdy");

      form.addEventListener("submit", function (pre) {
        pre.preventDefault();

        let card = document.createElement("div");
        card.classList.add("card");
        let img = document.createElement("img");
        img.setAttribute('src',inputs[0].value);
        img.setAttribute('alt', "Profile Pic");
        let h2 = document.createElement('h2');
        h2.textContent = inputs[1].value;
        let h3 = document.createElement('h3');
        h3.textContent = inputs[2].value;
        let p = document.createElement('p');
        p.textContent = inputs[3].value;

        card.appendChild(img);
        card.appendChild(h2);-
        card.appendChild(h3);
        card.appendChild(p);

        body.appendChild(card);

      });



    </script>
  </body>
</html>
