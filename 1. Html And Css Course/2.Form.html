<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Example</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        form {
            max-width: 400px;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        label {
            font-weight: bold;
        }
        input[type="text"],
        input[type="email"],
        textarea {
            width: 95%;
            padding: 8px;
            margin-top: 5px;
            margin-bottom: 15px;
            border: 1px solid #6ef84c;
            border-radius: 4px;
        }
        input[type="submit"] {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        input[type="submit"]:hover {
            background-color: #45a049;
        }

    </style>
</head>
<body>
    <main>
        <h1>HTML Form Example</h1>
        <p>Forms are used to collect user input and submit it to a server for processing. Here is an example of a simple HTML form:</p>
        <form action="/submit" method="post">
            <label for="name">Name:</label><br>
            <input type="text" id="name" name="name" placeholder="Enter Your name here" required><br><br>
            
            <label for="email">Email:</label><br>
            <input type="email" id="email" name="email" placeholder="Enter Your email here" required><br><br>
            <label for="dateofbirth" >Date of Birth:</label>
            <input type="date" id="dateofbirth" name="dateofbirth" required><br><br>

            <!-- Gender -->
            <label for="gender">Gender:</label><br>
            <select id="gender" name="gender" required>
                <option value="">Select Gender</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
                <option value="other">Other</option>
            </select><br><br>

            <!-- Skills checkbox -->
            <label>Skills:</label><br>
            <input type="checkbox" id="skill1" name="skills" value="HTML">
            <label for="skill1">HTML</label><br>
            <input type="checkbox" id="skill2" name="skills" value="CSS">
            <label for="skill2">CSS</label><br>
            <input type="checkbox" id="skill3" name="skills" value="JavaScript">
            <label for="skill3">JavaScript</label><br><br>

            <label for="message">Message:</label><br>
            <textarea id="message" name="message" placeholder="Enter Your message here" required></textarea><br>

            <!-- select country -->
            <label for="country">Country:</label><br>
            <select id="country" name="country" required>
                <option value="">Select Country</option>
                <option value="usa">United States</option>
                <option value="uk">United Kingdom</option>
                <option value="Ind">India</option>
            </select><br><br>

            <input type="submit" value="Submit">
        </form>
    </main>
</body>
</html>
