<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Flexbox</title>
    <style>
      body {
        height: 100vh;
        width: 100vw;
      }
      .parent {
        height: 100%;
        width: 100%;
        background-color: black;
        display: flex;
        /* flex-direction: column; */
        align-items: center;
        justify-content: space-evenly;
        flex-wrap: wrap;
      }
      .child1 {
        height: 200px;
        width: 200px;
        background-color: crimson;
      }
      .child2 {
        height: 200px;
        width: 200px;
        background-color: green;
      }
      .child3 {
        height: 200px;
        width: 200px;
        background-color: yellow;
      }
      .child4 {
        height: 200px;
        width: 200px;
        background-color: rgb(46, 58, 224);
      }
      nav {
        background-color: lightblue;
        height: 60px;
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 20px;
      }
    </style>
  </head>

  </body>
</html>
