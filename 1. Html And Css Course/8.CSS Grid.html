<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Grid</title>
    <style>
        *{
            margin: 0;;
            padding: 0;
            font-family: Arial, "Helvetica Neue", Helvetica, sans-serif;
        }
        html,body{
            height: 100vh;
            width: 100Vw;
        }
        .parent{
            background-color: black;
            height: 100%;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            grid-template-rows: 1fr 1fr 1fr;
            /* grid-auto-flow: dense; */

        }
        .child1{
            background-color: crimson;
            border: 2px solid white;
            height: 100px;
            width: 100px;
            align-self: center;
            justify-self: center;
        }
        .child2{
            background-color: rgb(16, 211, 9);
            border: 2px solid white;
            height: 150px;
            width: 150px;
            align-self: center;
            justify-self: center;
        }
        .child3{
            background-color: rgb(35, 38, 212);
            border: 2px solid rgb(255, 255, 255);
            height: 100px;
            width: 100px;
            align-self: center;
            justify-self: center;
        }
        .child4{
            background-color: rgb(200, 220, 20);
            border: 2px solid white;
        }
    </style>
</head>
<body>
    <div class="parent">
        <div class="child1"></div>
        <div class="child2"></div>
        <div class="child3"></div>
        <div class="child4"></div>
        <div class="child1"></div>
        <div class="child2"></div>
        <div class="child3"></div>
        <div class="child4"></div>
    </div>
</body>
</html>
